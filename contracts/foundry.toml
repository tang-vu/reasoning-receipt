[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read-write", path = "./out" }]
remappings = [
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
quote_style = "double"

[rpc_endpoints]
arc_testnet = "${RPC}"
