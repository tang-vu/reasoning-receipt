<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark bg matching the dashboard -->
  <rect width="1200" height="630" fill="#0a0a0b"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(94,234,212,0.06)" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo block (top-left) -->
  <g transform="translate(80,80)">
    <rect width="56" height="56" rx="10" fill="#0a0a0b" stroke="#5eead4" stroke-width="2.5"/>
    <rect x="8" y="2" width="40" height="50" rx="3" fill="none" stroke="#5eead4" stroke-width="2.5"/>
    <line x1="16" y1="14" x2="42" y2="14" stroke="#5eead4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="16" y1="24" x2="42" y2="24" stroke="#5eead4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="16" y1="34" x2="34" y2="34" stroke="#5eead4" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="160" y="118" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="600" fill="#e7e7ea" letter-spacing="-0.5">ReasoningReceipt</text>
  <text x="160" y="148" font-family="ui-monospace, SF Mono, Consolas, monospace" font-size="16" fill="#9aa0a8">x402 · Arc Testnet · byte-verifiable reasoning</text>

  <!-- Main headline -->
  <text x="80" y="290" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="78" font-weight="600" fill="#e7e7ea" letter-spacing="-2.5">
    The trace
    <tspan fill="#5eead4"> is </tspan>
    the product.
  </text>

  <!-- Sub-headline -->
  <text x="80" y="360" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" fill="#9aa0a8" letter-spacing="-0.3">
    <tspan x="80" dy="0">Five agents debate. Supervisor merges. Critic audits.</tspan>
    <tspan x="80" dy="40">Merkle-rooted reasoning DAG, settled on Arc in &lt;1s for ~$0.0007.</tspan>
  </text>

  <!-- Capability strip -->
  <g transform="translate(80,500)" font-family="ui-monospace, SF Mono, Consolas, monospace" font-size="14">
    <g>
      <rect width="220" height="36" rx="18" fill="rgba(94,234,212,0.10)" stroke="rgba(94,234,212,0.4)" stroke-width="1"/>
      <text x="20" y="23" fill="#5eead4">BULL · BEAR · EDGE</text>
    </g>
    <g transform="translate(240,0)">
      <rect width="200" height="36" rx="18" fill="rgba(167,139,250,0.10)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
      <text x="20" y="23" fill="#a78bfa">CRITIC · 6-DIM AUDIT</text>
    </g>
    <g transform="translate(460,0)">
      <rect width="220" height="36" rx="18" fill="rgba(94,234,212,0.10)" stroke="rgba(94,234,212,0.4)" stroke-width="1"/>
      <text x="20" y="23" fill="#5eead4">MERKLE DAG ON ARC</text>
    </g>
    <g transform="translate(700,0)">
      <rect width="180" height="36" rx="18" fill="rgba(167,139,250,0.10)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
      <text x="20" y="23" fill="#a78bfa">x402 v2 PAYWALL</text>
    </g>
  </g>

  <!-- URL bottom-right -->
  <text x="1120" y="585" font-family="ui-monospace, SF Mono, Consolas, monospace" font-size="20" fill="#9aa0a8" text-anchor="end">rrtrace.xyz</text>
</svg>
