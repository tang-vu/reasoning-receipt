<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a0b"/>
  <!-- Two stacked "receipt" rectangles with a tear edge, accent stroke -->
  <rect x="7" y="6" width="14" height="20" rx="1" fill="none" stroke="#5eead4" stroke-width="2"/>
  <rect x="11" y="9" width="14" height="20" rx="1" fill="#0a0a0b" stroke="#5eead4" stroke-width="2"/>
  <!-- Three "lines of trace" -->
  <line x1="13" y1="13" x2="22" y2="13" stroke="#5eead4" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="13" y1="17" x2="22" y2="17" stroke="#5eead4" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="13" y1="21" x2="19" y2="21" stroke="#5eead4" stroke-width="1.4" stroke-linecap="round"/>
</svg>
